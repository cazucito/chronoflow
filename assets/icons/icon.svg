<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="#4CAF50"/>
  
  <!-- Clock face -->
  <circle cx="256" cy="256" r="180" fill="#ffffff"/>
  <circle cx="256" cy="256" r="170" fill="#f5f5f5"/>
  
  <!-- Clock markers -->
  <g fill="#333">
    <rect x="250" y="100" width="12" height="30" rx="2"/>
    <rect x="250" y="382" width="12" height="30" rx="2"/>
    <rect x="100" y="250" width="30" height="12" rx="2"/>
    <rect x="382" y="250" width="30" height="12" rx="2"/>
  </g>
  
  <!-- Hour hand -->
  <rect x="246" y="160" width="20" height="100" rx="10" fill="#333" transform="rotate(-60 256 256)"/>
  
  <!-- Minute hand -->
  <rect x="248" y="130" width="16" height="140" rx="8" fill="#4CAF50" transform="rotate(30 256 256)"/>
  
  <!-- Center dot -->
  <circle cx="256" cy="256" r="16" fill="#4CAF50"/>
  <circle cx="256" cy="256" r="10" fill="#fff"/>
</svg>