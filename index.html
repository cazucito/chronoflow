<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="ChronoFlow - Timer PWA elegante para marcar tiempos de actividades. Funciona offline.">
    <meta name="theme-color" content="#4CAF50">
    <meta name="color-scheme" content="light dark">
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192x192.png">
    <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png">
    
    <!-- Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="ChronoFlow">
    
    <title>ChronoFlow</title>
    
    <!-- Preconnect para performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/wallclock.css">
</head>
<body>
    <!-- ============================================
         MODO RELOJ DIGITAL DE PARED (Wall Clock Mode)
         Única interfaz - Timer fullscreen estilo reloj
         ============================================ -->
    <div id="wallclock-mode" class="wallclock-mode" aria-label="Modo reloj digital">
        
        <!-- Label principal -->
        <div class="wallclock-label" id="wallclock-label"></div>
        
        <!-- Display principal: Timer -->
        <div class="wallclock-timer-section" role="timer" aria-live="polite">
            <div class="wallclock-digits">
                <span class="digit digit-h1">0</span>
                <span class="digit digit-h2">0</span>
                <span class="digit-separator">:</span>
                <span class="digit digit-m1">0</span>
                <span class="digit digit-m2">0</span>
                <span class="digit-separator">:</span>
                <span class="digit digit-s1">0</span>
                <span class="digit digit-s2">0</span>
            </div>
        </div>
        
        <!-- Zonas horarias integradas debajo del timer -->
        <div class="wallclock-timezones-inline">
            <!-- Zona horaria principal -->
            <div class="timezone-row timezone-primary-row">
                <span class="tz-row-label">INICIO</span>
                <span class="tz-row-flag">🇨🇴</span>
                <span class="tz-row-code" id="tz-primary-code">COL</span>
                <time id="wallclock-current-primary" class="tz-row-time">--:--</time>
                <span class="tz-row-arrow">→</span>
                <span class="tz-row-label">TERMINA</span>
                <time id="wallclock-endtime-primary" class="tz-row-time">--:--</time>
            </div>
            
            <!-- Zona horaria secundaria -->
            <div class="timezone-row timezone-secondary-row">
                <span class="tz-row-label">INICIO</span>
                <span class="tz-row-flag-secondary">🇲🇽</span>
                <span class="tz-row-code-secondary" id="tz-secondary-code">CDMX</span>
                <time id="wallclock-current-secondary" class="tz-row-time-secondary">--:--</time>
                <span class="tz-row-arrow-secondary">→</span>
                <span class="tz-row-label">TERMINA</span>
                <time id="wallclock-endtime-secondary" class="tz-row-time-secondary">--:--</time>
            </div>
        </div>
        
        <!-- Controles flotantes -->
        <div class="wallclock-controls">
            <button type="button" id="wallclock-btn-start" class="wallclock-btn wallclock-btn-play" aria-label="Iniciar">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M8 5v14l11-7z"/>
                </svg>
            </button>
            <button type="button" id="wallclock-btn-pause" class="wallclock-btn wallclock-btn-pause hidden" aria-label="Pausar">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                </svg>
            </button>
            <button type="button" id="wallclock-btn-reset" class="wallclock-btn wallclock-btn-reset" aria-label="Resetear">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
                </svg>
            </button>
        </div>
        
        <!-- Indicador de estado -->
        <div class="wallclock-status" id="wallclock-status"></div>
        
        <!-- Configuración de tiempo (visible en estado IDLE) -->
        <div class="wallclock-config" id="wallclock-config">
            <div class="wallclock-config-title">Configurar Timer</div>
            <div class="wallclock-config-inputs">
                <div class="wallclock-config-field">
                    <label for="timer-min">Min</label>
                    <input type="number" id="timer-min" min="0" max="999" value="5" aria-label="Minutos">
                </div>
                <span class="wallclock-config-sep">:</span>
                <div class="wallclock-config-field">
                    <label for="timer-sec">Seg</label>
                    <input type="number" id="timer-sec" min="0" max="59" value="0" aria-label="Segundos">
                </div>
            </div>
            <input type="text" id="timer-label" placeholder="¿Qué estás cronometrando?" aria-label="Descripción">
            
            <!-- Selector de zona horaria -->
            <div class="timezone-selector">
                <label for="timezone-select">Zona horaria</label>
                <select id="timezone-select" aria-label="Seleccionar zona horaria">
                    <option value="America/Bogota" data-offset="-5" data-code="COL">🇨🇴 Bogotá (COL)</option>
                    <option value="America/Mexico_City" data-offset="-6" data-code="CDMX">🇲🇽 CDMX (MEX)</option>
                    <option value="America/Argentina/Buenos_Aires" data-offset="-3" data-code="ARG">🇦🇷 Buenos Aires (ARG)</option>
                    <option value="America/Santiago" data-offset="-4" data-code="CHI">🇨🇱 Santiago (CHI)</option>
                    <option value="America/Lima" data-offset="-5" data-code="PER">🇵🇪 Lima (PER)</option>
                    <option value="America/Sao_Paulo" data-offset="-3" data-code="BRA">🇧🇷 São Paulo (BRA)</option>
                </select>
            </div>
        </div>
    </div>
    
    <!-- Scripts -->
    <script src="js/storage.js"></script>
    <script src="js/timer.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/wallclock.js"></script>
</body>
</html>
