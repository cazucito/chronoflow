<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="ChronoFlow - Cronómetro PWA elegante, simple y sin fricción. Funciona offline.">
    <meta name="theme-color" content="#4CAF50">
    <meta name="color-scheme" content="light dark">
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192x192.png">
    <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png">
    
    <!-- Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="ChronoFlow">
    
    <title>ChronoFlow</title>
    
    <!-- Preconnect para performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/wallclock.css">
</head>
<body>
    <div id="app">
        <header class="app-header" role="banner">
            <h1>
                <span aria-hidden="true">⏱️</span>
                <span>ChronoFlow</span>
            </h1>
        </header>
        
        <main class="app-main" role="main" aria-label="Cronómetro">
            <!-- Label configurable -->
            <section class="timer-label-section" aria-label="Etiqueta del timer">
                <input 
                    type="text" 
                    id="timer-label" 
                    class="timer-label-input" 
                    placeholder="¿Qué estás cronometrando?"
                    value=""
                    aria-label="Descripción del timer">
            </section>
            
            <section class="timer-display" aria-live="polite" aria-atomic="true">
                <time id="time-display" datetime="PT0S" role="timer" aria-label="00:00:00.00">
                    00:00:00.00
                </time>
            </section>
            
            <!-- Hora actual y hora de finalización (solo para countdown) -->
            <section id="time-info" class="time-info hidden" aria-label="Información de tiempo">
                <div class="time-info-item">
                    <span class="time-info-label">Ahora:</span>
                    <time id="current-time" class="time-info-value">--:--</time>
                </div>
                <div class="time-info-separator">→</div>
                <div class="time-info-item">
                    <span class="time-info-label">Termina:</span>
                    <time id="end-time" class="time-info-value">--:--</time>
                </div>
            </section>
            
            <nav class="timer-controls" role="toolbar" aria-label="Controles del cronómetro">
                <button 
                    id="btn-start" 
                    class="btn btn-primary" 
                    type="button"
                    aria-label="Iniciar cronómetro">
                    Iniciar
                </button>
                <button 
                    id="btn-pause" 
                    class="btn btn-secondary" 
                    type="button"
                    disabled
                    aria-label="Pausar cronómetro">
                    Pausar
                </button>
                <button 
                    id="btn-reset" 
                    class="btn btn-tertiary" 
                    type="button"
                    aria-label="Reiniciar cronómetro">
                    Reset
                </button>
            </nav>
            
            <section class="mode-selector" aria-label="Selector de modo">
                <label for="timer-mode" class="sr-only">Modo de cronómetro</label>
                <select id="timer-mode" name="timer-mode">
                    <option value="stopwatch">Cronómetro</option>
                    <option value="timer">Timer</option>
                    <option value="pomodoro">Pomodoro</option>
                </select>
            </section>
            
            <!-- Selector de modo de visualización -->
            <section class="view-mode-selector" aria-label="Modo de visualización">
                <button type="button" id="btn-toggle-wallclock" class="btn btn-wallclock" aria-label="Activar modo reloj de pared">
                    <span class="btn-icon">🖥️</span>
                    <span class="btn-text">Modo Reloj</span>
                </button>
            </section>
            
            <!-- Selector de temas visuales -->
            <section class="theme-selector" aria-label="Selector de tema visual">
                <label for="theme-select" class="sr-only">Tema visual</label>
                <select id="theme-select" name="theme">
                    <option value="minimal">⚪ Minimal</option>
                    <option value="nature">🌿 Nature</option>
                    <option value="ocean">🌊 Ocean</option>
                    <option value="dark">🌙 Dark</option>
                    <option value="custom">🎨 Personalizado</option>
                </select>
            </section>
            
            <!-- Configuración de tema personalizado -->
            <section id="custom-theme-config" class="custom-theme-config hidden" aria-label="Configuración de tema personalizado">
                <h3>Personalizar tema</h3>
                <div class="custom-theme-grid">
                    <div class="custom-theme-field">
                        <label for="custom-primary">Color principal</label>
                        <input type="color" id="custom-primary" value="#4CAF50">
                    </div>
                    <div class="custom-theme-field">
                        <label for="custom-bg">Color fondo</label>
                        <input type="color" id="custom-bg" value="#ffffff">
                    </div>
                    <div class="custom-theme-field">
                        <label for="custom-text">Color texto</label>
                        <input type="color" id="custom-text" value="#212121">
                    </div>
                    <div class="custom-theme-field">
                        <label for="custom-radius">Bordes (px)</label>
                        <input type="range" id="custom-radius" min="0" max="20" value="8">
                        <span id="custom-radius-value">8px</span>
                    </div>
                </div>
                <button type="button" id="btn-save-custom" class="btn btn-primary btn-save-custom">Guardar tema</button>
            </section>
            
            <!-- Configuración de tiempo para Timer -->
            <section id="timer-config" class="timer-config hidden" aria-label="Configuración de tiempo">
                <div class="time-inputs">
                    <div class="time-field">
                        <label for="timer-min">Min</label>
                        <input type="number" id="timer-min" min="0" max="999" value="5" aria-label="Minutos">
                    </div>
                    <span class="time-separator">:</span>
                    <div class="time-field">
                        <label for="timer-sec">Seg</label>
                        <input type="number" id="timer-sec" min="0" max="59" value="0" aria-label="Segundos">
                    </div>
                </div>
            </section>
            
            <!-- Configuración para Pomodoro -->
            <section id="pomodoro-config" class="pomodoro-config hidden" aria-label="Configuración Pomodoro">
                <div class="pomodoro-selector">
                    <button type="button" class="btn-pomodoro active" data-phase="work" data-min="25">
                        <span class="pomo-label">Trabajo</span>
                        <span class="pomo-time">25:00</span>
                    </button>
                    <button type="button" class="btn-pomodoro" data-phase="short" data-min="5">
                        <span class="pomo-label">Descanso</span>
                        <span class="pomo-time">5:00</span>
                    </button>
                    <button type="button" class="btn-pomodoro" data-phase="long" data-min="15">
                        <span class="pomo-label">Largo</span>
                        <span class="pomo-time">15:00</span>
                    </button>
                </div>
            </section>
        </main>
        
        <footer class="app-footer" role="contentinfo">
            <p>ChronoFlow v1.0 — PWA</p>
            <p class="sr-only">
                Atajos de teclado: Espacio para iniciar/pausar, R para resetear.
            </p>
        </footer>
    </div>
    
    <!-- ============================================
         MODO RELOJ DIGITAL DE PARED (Wall Clock Mode)
         Pantalla completa estilo reloj digital
         ============================================ -->
    <div id="wallclock-mode" class="wallclock-mode hidden" aria-label="Modo reloj digital">
        <!-- Botón cerrar modo reloj -->
        <button type="button" id="btn-close-wallclock" class="wallclock-close" aria-label="Cerrar modo reloj">
            <span>✕</span>
        </button>
        
        <!-- Display principal del tiempo -->
        <div class="wallclock-display" role="timer" aria-live="polite">
            <div class="wallclock-digits">
                <span class="digit digit-h1">0</span>
                <span class="digit digit-h2">0</span>
                <span class="digit-separator">:</span>
                <span class="digit digit-m1">0</span>
                <span class="digit digit-m2">0</span>
                <span class="digit-separator">:</span>
                <span class="digit digit-s1">0</span>
                <span class="digit digit-s2">0</span>
            </div>
            <div class="wallclock-centis">
                <span class="digit-cs1">0</span>
                <span class="digit-cs2">0</span>
            </div>
        </div>
        
        <!-- Información secundaria -->
        <div class="wallclock-info">
            <div class="wallclock-label" id="wallclock-label"></div>
            <div class="wallclock-times">
                <div class="wallclock-now">
                    <span class="info-label">Inicio</span>
                    <time id="wallclock-current">--:--</time>
                </div>
                <div class="wallclock-arrow">→</div>
                <div class="wallclock-end">
                    <span class="info-label">Termina</span>
                    <time id="wallclock-endtime">--:--</time>
                </div>
            </div>
        </div>
        
        <!-- Controles flotantes -->
        <div class="wallclock-controls">
            <button type="button" id="wallclock-btn-start" class="wallclock-btn wallclock-btn-play" aria-label="Iniciar">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M8 5v14l11-7z"/>
                </svg>
            </button>
            <button type="button" id="wallclock-btn-pause" class="wallclock-btn wallclock-btn-pause hidden" aria-label="Pausar">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                </svg>
            </button>
            <button type="button" id="wallclock-btn-reset" class="wallclock-btn wallclock-btn-reset" aria-label="Resetear">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
                </svg>
            </button>
        </div>
        
        <!-- Indicador de estado -->
        <div class="wallclock-status" id="wallclock-status"></div>
    </div>
    
    <!-- Scripts -->
    <script src="js/storage.js"></script>
    <script src="js/timer.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/wallclock.js"></script>
    <script src="js/pwa.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
